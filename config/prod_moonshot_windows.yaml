runtime:
  task: "Play the game"
  mode: "prod_windows"
  max_steps: 5
  log_level: "INFO"
  stop_on_failures: 1
  max_memory_records: 500
  dry_run: false
  action_delay: 0.2
  startup_delay_seconds: 3
  enable_preflight: true
  preflight_fail_on_warning: false
  enable_gui_health_check: true
  gui_health_capture_count: 2
  pause_on_repeated_observe_failures: true
  max_observe_failures: 2

model:
  provider: "openai_compatible"
  name: "moonshot-v1-8k"
  base_url: "https://api.moonshot.cn/v1"
  api_key_env: "MOONSHOT_API_KEY"
  temperature: 0.2
  max_tokens: 512

environment:
  name: "Slay the Spire"
  window_name: "Slay the Spire 2"
  capture_mode: "window"
  capture_bbox: null
  bring_window_to_front: true
  force_scene: null

visualization:
  enabled: true
  refresh_interval_ms: 300

paths:
  run_logs: "logs/run_logs"
  action_logs: "logs/action_logs"
  states: "data/states"
  actions: "data/actions"
  feedback: "data/feedback"
  skills: "data/skills"
  screenshots_current: "screenshots/current"
  screenshots_history: "screenshots/history"

scene_match:
  enabled: true
  config_file: "config/scene_match.yaml"
  templates_root: "pic/scene_templates"
  cache_dir: "data/template_cache"
  hash_method: "dhash"
  min_scene_score: 0.76
  min_margin: 0.05